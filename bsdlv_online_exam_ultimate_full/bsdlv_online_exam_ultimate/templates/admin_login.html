
{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:520px;margin:auto">
  <h2>{{ T.admin_login }}</h2>
  <form method="post" class="grid">
    <input name="username" placeholder="Username" required value="admin">

    <button type="submit">{{ T.login }}</button>
  </form>
</div>
{% endblock %}
