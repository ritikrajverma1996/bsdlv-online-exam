
{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Results</h2>
  <table>
    <tr><th>Student</th><th>Exam</th><th>Score</th><th>Submitted</th><th>PDF</th></tr>
    {% for r in results %}
    <tr>
      <td>{{ r.student_name }}<div class="small muted">{{ r.roll_no }}</div></td>
      <td>{{ r.exam_title }}</td>
      <td>{{ r.score }} / {{ r.total_marks }}</td>
      <td>{{ r.submitted_at }}</td>
      <td><a class="btn" href="{{ url_for('admin_result_pdf', rid=r.id) }}">Download PDF</a></td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
