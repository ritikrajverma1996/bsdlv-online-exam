
{% extends 'base.html' %}
{% block content %}
<div class="card">
  <h2>Edit Question</h2>
  <form method="post" class="grid">
      <textarea name="question" required>{{ qrow.question }}</textarea>
      <div class="grid grid-2">
        <input name="optionA" value="{{ qrow.optionA }}" required>
        <input name="optionB" value="{{ qrow.optionB }}" required>
        <input name="optionC" value="{{ qrow.optionC }}" required>
        <input name="optionD" value="{{ qrow.optionD }}" required>
      </div>
      <div class="grid grid-2">
        <select name="correctAnswer">
          {% for c in ['A','B','C','D'] %}<option value="{{ c }}" {{ 'selected' if qrow.correctAnswer==c else '' }}>{{ c }}</option>{% endfor %}
        </select>
        <input name="marks" type="number" step="0.5" value="{{ qrow.marks }}">
      </div>
      <div class="grid grid-2">
        <input name="difficulty" value="{{ qrow.difficulty }}">
        <input name="subject" value="{{ qrow.subject }}">
      </div>
      <input name="chapter" value="{{ qrow.chapter }}">
      <button type="submit">Update Question</button>
  </form>
</div>
{% endblock %}
