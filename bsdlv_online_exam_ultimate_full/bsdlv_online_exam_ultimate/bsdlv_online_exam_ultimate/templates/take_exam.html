
{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="top-actions" style="justify-content:space-between">
    <h2>{{ exam.title }}</h2>
    <div><b>Time Left:</b> <span id="timer"></span></div>
  </div>
  <form method="post" action="{{ url_for('submit_exam', eid=exam.id) }}" id="examForm">
    <input type="hidden" name="started_at" value="{{ now }}">
    {% for q in questions %}
    <div class="question-box">
      <p><b>Q{{ loop.index }}.</b> {{ q.question }} <span class="muted">[{{ q.marks }} marks]</span></p>
      {% for code, text in [('A', q.optionA), ('B', q.optionB), ('C', q.optionC), ('D', q.optionD)] %}
      <label class="option"><input type="radio" name="q_{{ q.id }}" value="{{ code }}"> {{ code }}. {{ text }}</label>
      {% endfor %}
    </div>
    {% endfor %}
    <button type="submit">{{ T.submit_exam }}</button>
  </form>
</div>
<script>
let seconds = {{ exam.duration_minutes|int }} * 60;
const timer = document.getElementById('timer');
function tick(){
  let m = Math.floor(seconds/60), s = seconds%60;
  timer.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  if(seconds<=0){ document.getElementById('examForm').submit(); return; }
  seconds--;
}
tick(); setInterval(tick,1000);
</script>
{% endblock %}
